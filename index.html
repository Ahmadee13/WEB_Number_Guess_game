<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guess The Number Game</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>

    <div class="game-box">
        <h1>Guess The Number (1 - 10)</h1>

        <p>Enter a number between 1 and 10:</p>

        <input type="number" id="userGuess" min="1" max="10">

        <p>Attempts Left: <span id="attemptCount">3</span></p>

        <button id="guessBtn">Submit Guess</button>
        <button id="resetBtn">Reset Game</button>

        <p id="message"></p>
    </div>

    <script src="game.js"></script>
</body>
</html>
